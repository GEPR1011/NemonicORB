# ═══════════════════════════════════════════════════════════════
# NemonicOrb — Pools de Modificadores
# Formula de valor: value = (base + scale * itemLevel) * (1 ± spread)
# spread = variacao aleatoria, max-spread = limite da variacao
# ═══════════════════════════════════════════════════════════════

# ── WEAPON ──────────────────────────────────────────────────
nemonicorp_weapon_positive:
    min: 1
    max: 1
    modifiers:
        orb_w_dano_cat: 3
        orb_w_crit_cat: 2
        orb_w_atkspd_cat: 1
        orb_w_skilldmg_cat: 2
        orb_w_projdmg_cat: 1
        orb_w_lifesteal_cat: 1
        orb_w_util_cat: 1
        orb_w_pve_cat: 1
        orb_w_elemental_cat: 2
        orb_w_spellcost_cat: 1
nemonicorp_weapon_negative:
    min: 0
    max: 1
    modifiers:
        orb_w_neg_cat: 1

# ── ARMOR ───────────────────────────────────────────────────
